<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배드민턴 점수판</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Orbitron:wght@700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header class="app-header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(255, 255, 255, 0.05); border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.1);">
            <div style="font-size: 1.2rem; font-weight: 800; font-family: 'Orbitron', sans-serif; color: #fff; letter-spacing: 1px;">BadmintonScore()</div>
            <div id="auth-container">
                <button id="login-btn" style="padding: 8px 16px; font-size: 0.85rem; border-radius: 12px; background: rgba(56, 189, 248, 0.2); border: 1px solid #38bdf8; color: #38bdf8; font-weight: bold; cursor: pointer; transition: background 0.2s;">Google 로그인</button>
                <div id="user-info" style="display: none; align-items: center; gap: 10px;">
                    <span id="user-email" style="font-size: 0.85rem; color: #a1a1aa; font-weight: 600;"></span>
                    <button id="logout-btn" style="padding: 8px 16px; font-size: 0.85rem; border-radius: 12px; background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #ef4444; font-weight: bold; cursor: pointer; transition: background 0.2s;">로그아웃</button>
                </div>
            </div>
        </header>

        <!-- 메인 스코어보드 영역 -->
        <main class="scoreboard-main">
            <!-- A팀 -->
            <div class="team-card team-a">
                <div class="team-header">
                    <input type="text" class="team-name-input" id="teamA-name" value="A팀" placeholder="팀명">
                    <div class="players-input">
                        <input type="text" class="player-input" id="teamA-player1" placeholder="선수 1">
                        <input type="text" class="player-input" id="teamA-player2" placeholder="선수 2">
                    </div>
                </div>

                <div class="score-display-wrapper" onclick="window.gameControls.changeScore('A', 1)">
                    <div class="serve-indicator" id="serve-indicator-A">🏸 서브권</div>
                    <div class="score-value" id="score-A">0</div>
                </div>

                <div class="score-controls">
                    <button class="btn btn-primary" onclick="window.gameControls.changeScore('A', 1)">+ 1</button>
                    <button class="btn btn-secondary" onclick="window.gameControls.changeScore('A', -1)">- 1</button>
                </div>
            </div>

            <!-- VS 구분자 -->
            <div class="vs-divider"
                style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;">
                <button class="btn btn-serve" onclick="window.gameControls.toggleServe()"
                    style="padding: 2px 10px; font-size: 0.8rem; border-radius: 12px; white-space: nowrap; z-index: 10; cursor: pointer;">서브권</button>
                <span style="font-size: 1.2rem; font-weight: bold; color: rgba(255, 255, 255, 0.4);">VS</span>
                <button class="btn btn-serve" onclick="window.gameControls.endGame()"
                    style="padding: 2px 10px; font-size: 0.8rem; border-radius: 12px;white-space: nowrap;">게임종료</button>
                <button onclick="window.gameControls.resetGame()" title="새 게임 시작"
                    style="padding: 2px 10px; font-size: 0.8rem; border-radius: 12px; background: rgba(56, 189, 248, 0.2); border: 1px solid #38bdf8; white-space: nowrap; cursor: pointer; color: #38bdf8; font-weight: bold; transition: background 0.2s;">새
                    게임</button>
                <button onclick="window.gameControls.toggleHistory()" title="경기기록 보기/숨기기"
                    style="padding: 2px 10px; font-size: 0.8rem; border-radius: 12px; background: rgba(52, 211, 153, 0.2); border: 1px solid #34d399; white-space: nowrap; cursor: pointer; color: #34d399; font-weight: bold; transition: background 0.2s;">경기기록</button>
            </div>

            <!-- B팀 -->
            <div class="team-card team-b">
                <div class="team-header reverse">
                    <input type="text" class="team-name-input" id="teamB-name" value="B팀" placeholder="팀명">
                    <div class="players-input">
                        <input type="text" class="player-input" id="teamB-player1" placeholder="선수 1">
                        <input type="text" class="player-input" id="teamB-player2" placeholder="선수 2">
                    </div>
                </div>

                <div class="score-display-wrapper" onclick="window.gameControls.changeScore('B', 1)">
                    <div class="serve-indicator" id="serve-indicator-B">🏸 서브권</div>
                    <div class="score-value" id="score-B">0</div>
                </div>

                <div class="score-controls">
                    <button class="btn btn-primary" onclick="window.gameControls.changeScore('B', 1)">+ 1</button>
                    <button class="btn btn-secondary" onclick="window.gameControls.changeScore('B', -1)">- 1</button>
                </div>
            </div>
        </main>

        <section id="game-history-section" class="game-history" style="display: none;">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
                <h2 class="history-title" style="margin-bottom: 0;">경기기록 (일자별)</h2>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="text" id="search-player-input" class="player-input" placeholder="선수명 검색..."
                        style="width: 130px; font-size: 0.85rem;">
                </div>
            </div>
            <div class="history-list" id="match-history-container">
                <!-- Javascript를 통해 일자별 경기 기록이 렌더링됩니다. -->
                <div class="empty-history">아직 기록된 경기가 없습니다. (로그인 후 이용 가능)</div>
            </div>
        </section>
    </div>
    
    <!-- Firebase SDK (ES Module) -->
    <script type="module" src="app.js"></script>
</body>

</html>
